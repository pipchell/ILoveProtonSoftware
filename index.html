<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>You Are NOT An Idiot!</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @keyframes bgflash {
      0%, 49.9% { background-color: #ffffff; }
      50%, 100% { background-color: #000000; }
    }

    @keyframes textflash {
      0%, 49.9% { color: #000000; }
      50%, 100%  { color: #ffffff; }
    }

    @keyframes smileyflash {
      0%, 49.9% { filter: none; }
      50%, 100%  { filter: invert(1); }
    }

    body {
      font-family: 'Times New Roman', Times, serif;
      text-align: center;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      animation: bgflash 0.8s steps(1, end) infinite;
    }

    h1 {
      font-size: clamp(42px, 9vw, 96px);
      font-weight: bold;
      line-height: 1.1;
      max-width: 90vw;
      animation: textflash 0.8s steps(1, end) infinite;
    }

    p.sub {
      font-size: clamp(16px, 3vw, 28px);
      font-weight: bold;
      max-width: 80vw;
      animation: textflash 0.8s steps(1, end) infinite;
    }

    .proton-link {
      font-size: clamp(13px, 2vw, 20px);
      font-weight: bold;
      animation: textflash 0.8s steps(1, end) infinite;
    }

    .proton-link a {
      text-decoration: underline;
      animation: textflash 0.8s steps(1, end) infinite;
    }

    .face-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: min(420px, 80vw);
      margin: 4px 0;
    }

    .smiley-img {
      width: 80px;
      height: 80px;
      display: inline-block;
    }
  </style>
</head>
<body>

  <h1>you are not an idiot</h1>
  <p class="sub">You are actually quite smart. Well done.</p>

  <div class="face-row">
    <img class="smiley-img" src="smiley.gif" alt="smiley">
    <img class="smiley-img" src="smiley.gif" alt="smiley">
    <img class="smiley-img" src="smiley.gif" alt="smiley">
  </div>

  <div class="proton-link">
    <a href="https://proton.me" target="_blank" rel="noopener noreferrer">Be better, protect your privacy with proton.me</a>
  </div>

<script>
  const smileys = document.querySelectorAll(".smiley-img");
  let inverted = false;
  setInterval(() => {
    inverted = !inverted;
    smileys.forEach(s => s.style.filter = inverted ? "invert(1)" : "none");
  }, 800);
</script>
</body>
</html>
