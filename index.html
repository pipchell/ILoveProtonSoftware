<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>You Are NOT An Idiot!</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Times New Roman', Times, serif;
      text-align: center;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background-color: #ffffff;
      color: #000000;
    }

    h1 {
      font-size: clamp(42px, 9vw, 96px);
      font-weight: bold;
      line-height: 1.1;
      max-width: 90vw;
    }

    p.sub {
      font-size: clamp(16px, 3vw, 28px);
      font-weight: bold;
      max-width: 80vw;
    }

    .proton-link {
      font-size: clamp(13px, 2vw, 20px);
      font-weight: bold;
    }

    .proton-link a {
      text-decoration: underline;
      color: inherit;
    }

    .face-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: min(420px, 80vw);
      margin: 4px 0;
    }

    .smiley-img {
      width: 80px;
      height: 80px;
      display: inline-block;
    }
  </style>
</head>
<body>

  <h1>you are not an idiot</h1>
  <p class="sub">You are actually quite smart. Well done.</p>

  <div class="face-row">
    <img class="smiley-img" src="smiley.gif" alt="smiley">
    <img class="smiley-img" src="smiley.gif" alt="smiley">
    <img class="smiley-img" src="smiley.gif" alt="smiley">
  </div>

  <div class="proton-link">
    <a href="https://proton.me" target="_blank" rel="noopener noreferrer">Be better, protect your privacy with proton.me</a>
  </div>

  <script>
    const body = document.body;
    const smileys = document.querySelectorAll('.smiley-img');
    let white = true;

    setInterval(() => {
      white = !white;
      if (white) {
        body.style.backgroundColor = '#ffffff';
        body.style.color = '#000000';
        smileys.forEach(s => s.style.filter = 'none');
      } else {
        body.style.backgroundColor = '#000000';
        body.style.color = '#ffffff';
        smileys.forEach(s => s.style.filter = 'invert(1)');
      }
    }, 800);
  </script>

</body>
</html>
