<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I ❤️ Proton</title>
    <style>
        /* Smoothly shifts the background through different colors */
        @keyframes changeBackground {
            0% { background-color: #ffadad; }
            20% { background-color: #ffd6a5; }
            40% { background-color: #fdffb6; }
            60% { background-color: #caffbf; }
            80% { background-color: #9bf6ff; }
            100% { background-color: #ffadad; }
        }

        /* Flips the colors of the face box between black and white */
        @keyframes invertColors {
            0% { background-color: #000000; color: #ffffff; border-color: #ffffff; }
            50% { background-color: #ffffff; color: #000000; border-color: #000000; }
            100% { background-color: #000000; color: #ffffff; border-color: #ffffff; }
        }

        body {
            animation: changeBackground 10s ease infinite;
            color: #000000;
            font-family: "Times New Roman", Times, serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        /* Centered face box that flashes independently */
        .face-box {
            display: inline-block;
            font-size: 5rem;
            padding: 15px 40px;
            margin-bottom: 30px;
            line-height: 1;
            border: 8px solid #000000;
            animation: invertColors 0.5s infinite;
            letter-spacing: 15px;
        }

        h1 {
            font-size: 4rem;
            font-weight: bold;
            margin: 0 0 30px 0;
            line-height: 1.2;
        }

        .link-container {
            margin-top: 20px;
        }

        a {
            font-size: 1.5rem;
            color: #000000;
            text-decoration: underline;
            font-weight: bold;
        }
        
        a:hover {
            color: #6d4aff;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="face-box">☺☺☺</div>
        <h1>YOU ARE NOT<br>AN IDIOT.</h1>
        <div class="link-container">
            <a href="https://proton.me" target="_blank" rel="noopener noreferrer">PROTON.ME</a>
        </div>
    </div>

</body>
</html>
