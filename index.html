<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>You Are NOT An Idiot!</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Times New Roman', Times, serif;
      text-align: center;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    h1 {
      font-size: clamp(42px, 9vw, 96px);
      font-weight: bold;
      line-height: 1.1;
      max-width: 90vw;
    }
    p.sub {
      font-size: clamp(22px, 4.5vw, 48px);
      font-weight: bold;
      max-width: 80vw;
    }
    .proton-link {
      font-size: clamp(16px, 3vw, 32px);
      font-weight: bold;
    }
    .proton-link a {
      text-decoration: underline;
      color: inherit;
    }
    .face-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: min(600px, 80vw);
      margin: 4px 0;
    }
    .smiley-img {
      width: 100px;
      height: 100px;
    }
  </style>
</head>
<body>
  <h1>you are not an idiot</h1>
  <p class="sub">You are actually quite smart. Well done.</p>
  <div class="face-row">
    <img class="smiley-img" src="smiley_frame.png" alt="smiley">
    <img class="smiley-img" src="smiley_frame.png" alt="smiley">
    <img class="smiley-img" src="smiley_frame.png" alt="smiley">
  </div>
  <div class="proton-link">
    <a href="https://proton.me" target="_blank" rel="noopener noreferrer">Be better, protect your privacy with proton.me</a>
  </div>

  <script>
    const smileys = document.querySelectorAll('.smiley-img');
    let white = true;
    const INTERVAL = 600;

    function applyState() {
      if (white) {
        document.body.style.cssText = 'background-color:#ffffff;color:#000000;font-family:Times New Roman,Times,serif;text-align:center;overflow:hidden;height:100vh;width:100vw;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;';
        smileys.forEach(s => { s.style.filter = 'none'; });
      } else {
        document.body.style.cssText = 'background-color:#000000;color:#ffffff;font-family:Times New Roman,Times,serif;text-align:center;overflow:hidden;height:100vh;width:100vw;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;';
        smileys.forEach(s => { s.style.filter = 'invert(1)'; });
      }
    }

    applyState();

    setInterval(() => {
      white = !white;
      requestAnimationFrame(applyState);
    }, INTERVAL);
  </script>
</body>
</html>
